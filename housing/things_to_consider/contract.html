关于考试（ETH）","ref":"uni\/ethz\/exams.md","path":"uni\/ethz\/exams.html"},{"title":"奖助学金和助教兼职","ref":"uni\/ethz\/scholarships_and_TA_opportunities.md","path":"uni\/ethz\/scholarships_and_TA_opportunities.html"}]},{"title":"UZH相关","ref":"uni\/uzh.md","path":"uni\/uzh.html","children":[{"title":"关于学费缴纳","ref":"uni\/uzh\/tuition.md","path":"uni\/uzh\/tuition.html"},{"title":"关于开学材料（UZH）","ref":"uni\/uzh\/documents_for_school_start.md","path":"uni\/uzh\/documents_for_school_start.html"},{"title":"关于学生卡（UZH）","ref":"uni\/uzh\/legi.md","path":"uni\/uzh\/legi.html"},{"title":"关于选课和考试（UZH）","ref":"uni\/uzh\/course_enrollment_and_exams.md","path":"uni\/uzh\/course_enrollment_and_exams.html"}]}]},{"title":"五、结语 & 学联服务","ref":"end.md","path":"end.html","children":[{"title":"关于学联","ref":"end\/about_acssz.md","path":"end\/about_acssz.html"},{"title":"学联福利汇总","ref":"end\/benefits.md","path":"end\/benefits.html"},{"title":"结语","ref":"end\/end.md","path":"end\/end.html"}]}]}],"config":{"title":"苏黎世留学 - 新生手册","plugins":["baidu-tongji","assistant","components"],"pluginsConfig":{"assistant":{"siteId":"w9aAm1av"}}},"file":{"path":"housing\/things_to_consider\/contract.html","content":"> [success] 本章作者：任逍遥、杨晨宇、杨锦涛、徐思婕、赵逸飞及张家萌、陈庆瑄、彭雅莹、岳妮\n\n### **1. 租房合同和住址申报的关系**\n\n所谓“注册”，即在人口登记办公室（Personenmeldeamt \/ Einwohnerkontrolle）办理住址申报，是所有苏黎世居民的义务（具体可参考[关于“户口”和住址申报](关于“户口”和住址申报.md)章节），而**租房合同是办理住址申报的必要条件**，因此，租房时**必须关注是否能够签署租房合同**。只要有签署完成的租房合同，无论是Mietvertrag（直租合同）或Untermietvertrag（转租合同），都可以用来办理住址申报。\n一般，不能签署租房合同的房源，即不能用于住址申报的房源，都是一个月以下的短租。如果租房时长在一个月及以上，无论直租还是转租，按惯例都需要签署租房合同。\n此外，根据[苏黎世市官方政策](https:\/\/www.stadt-zuerich.ch\/prd\/de\/index\/bevoelkerungsamt\/umziehenmelden\/drittmeldepflicht.html)：\n如果A（二房东）决定**转租**房间给B（转租租客）无论是[外出期间的临时转租](https:\/\/www.stadt-zuerich.ch\/prd\/de\/index\/bevoelkerungsamt\/umziehenmelden\/temporaerelandesabwesenheit.html)还是长期转租，A都应与B签署转租合同（模板见:attachment[2019\\_Untermietvertrag-Wohnraeume\\_mp\\_interaktiv.pdf]，由[瑞士租房者协会](https:\/\/www.mieterverband.ch\/)提供）。\n\nA（二房东）应该**在转租开始的14天内完成**[第三方申报](https:\/\/www.stadt-zuerich.ch\/prd\/de\/index\/bevoelkerungsamt\/umziehenmelden\/drittmeldepflicht.html)（可[在线完成](https:\/\/www.drittmeldung.ch\/ui\/#\/home)），这是**A作为二房东必须履行的义务**。与此同时，在合同起始日期（已在瑞士）或落地后（还没来瑞士）14天内，**B亦应该前往所在地的人口登记办公室申报住址**。请注意，这是两件**并行但独立**的事情，需要A和B分别完成各自的义务。\n\n^\n\n### **2. 传说中的”注册地址**“**是什么**\n\n总的来说，“注册地址”一词是很久以前坊间以讹传讹冒出来的词汇，其**不对应任何官方条文概念**，实际官方含义可理解为”向人口登记办公室申报的住址“。\n\n^\n\n### **3. 关于“同一地址申报（“注册”）多人”问题**\n\n政府下属的人口登记办公室（Personenmeldeamt \/ Einwohnerkontrolle）并无房屋相关信息，仅负责住址登记。原则上，即使仅作短期居住也必须向政府进行申报。因此，**只要原房东同意二房东转租**，**二房东和转租租客可以且必须在同一地址申报**。\n\n^\n\n### **4. 关于“收\/出‘注册’地址**”\n\n所谓收“注册”地址\/出“注册”地址，其实就是开假的租房合同给你，实际上你并不住那里，只是让你可以先去申报住址。**学联非常不推荐买卖“注册”地址（假合同**），这是非法的，一旦被发现，将会导致一系列连锁的问题和麻烦。且移民局和人口登记办公室的文件都会寄到这个假地址，这样的话，你很有可能永远也拿不到这些文件了。\n","meta":{"mtime":"2023-12-13T01:04:34+08:00"}},"options":{"poweredBy":{"name":"顶想云","link":"https:\/\/www.topthink.com"}}}
</script>
