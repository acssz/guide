键团体，为在苏中国学生学者（包括但不限于本科、硕士、博士、博后及访问学者）与大使馆、总领馆之间建立沟通的桥梁；同时，它还是与兄弟学联、在苏各类协会及其他相关组织发展友好关系和合作的纽带。\n^\n\n### **2. 学联官方渠道**\n\n* 学联官网：<https:\/\/www.acssz.org\/>\n* 学联论坛：<https:\/\/forum.acssz.org\/>\n* 学联微信公众号：\n  ![](..\/.topwrite\/assets\/image_1682199759896.png =160)\n* 学联小红书：\n  ![](..\/.topwrite\/assets\/image_1682199946890.png =159)\n* 学联邮箱：<info@acssz.org>\n\n^\n\n### **3. 学联对外微信群聊**\n\n* 新生总群\n* 活动信息群\n* 租房信息群\n* 二手交易群\n* 保险互助群\n\n欢迎扫描下方二维码查看进群方式！\n![](..\/.topwrite\/assets\/image_1683482351317.png =238)\n\n^\n### **4. 加入我们**\n如你希望成为我们的一员，欢迎关注我们每年3月和9月的招新公告。","meta":{"mtime":"2023-12-20T07:04:31+08:00"}},"options":{"poweredBy":{"name":"顶想云","link":"https:\/\/www.topthink.com"}}}
