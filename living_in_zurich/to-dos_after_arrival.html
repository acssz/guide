ol_start.md","path":"uni\/ethz\/documents_for_school_start.html"},{"title":"关于学生卡（ETH）","ref":"uni\/ethz\/legi.md","path":"uni\/ethz\/legi.html"},{"title":"常用网站\/app","ref":"uni\/ethz\/websites_and_apps.md","path":"uni\/ethz\/websites_and_apps.html"},{"title":"关于选课（ETH）","ref":"uni\/ethz\/semester_and_course_enrollment.md","path":"uni\/ethz\/semester_and_course_enrollment.html"},{"title":"关于考试（ETH）","ref":"uni\/ethz\/exams.md","path":"uni\/ethz\/exams.html"},{"title":"奖助学金和助教兼职","ref":"uni\/ethz\/scholarships_and_TA_opportunities.md","path":"uni\/ethz\/scholarships_and_TA_opportunities.html"}]},{"title":"UZH相关","ref":"uni\/uzh.md","path":"uni\/uzh.html","children":[{"title":"关于学费缴纳","ref":"uni\/uzh\/tuition.md","path":"uni\/uzh\/tuition.html"},{"title":"关于开学材料（UZH）","ref":"uni\/uzh\/documents_for_school_start.md","path":"uni\/uzh\/documents_for_school_start.html"},{"title":"关于学生卡（UZH）","ref":"uni\/uzh\/legi.md","path":"uni\/uzh\/legi.html"},{"title":"关于选课和考试（UZH）","ref":"uni\/uzh\/course_enrollment_and_exams.md","path":"uni\/uzh\/course_enrollment_and_exams.html"}]}]},{"title":"五、结语 & 学联服务","ref":"end.md","path":"end.html","children":[{"title":"关于学联","ref":"end\/about_acssz.md","path":"end\/about_acssz.html"},{"title":"学联福利汇总","ref":"end\/benefits.md","path":"end\/benefits.html"},{"title":"结语","ref":"end\/end.md","path":"end\/end.html"}]}]}],"config":{"title":"苏黎世留学 - 新生手册","plugins":["baidu-tongji","assistant","components"],"pluginsConfig":{"assistant":{"siteId":"w9aAm1av"}}},"file":{"path":"living_in_zurich\/to-dos_after_arrival.html","content":"> [info] 【学联提醒】*如需要接机服务，请在[学联论坛2024接机供求贴](<https:\/\/forum.acssz.org\/d\/1161>)内发布需求，或直接联系帖子中提供接机的同学。*\n\n**以下内容按办理时间先后排列。**\n\n| 需办理事项                                 | 所需材料\/信息                                                                             | 办理后获得                                                                                                                                                                                   | 推荐办理时间                                          |\n| ------------------------------------- | ----------------------------------------------------------------------------------- | --------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------- | ----------------------------------------------- |\n| [办理Swisspass交通卡](21交通票.md)            | - 护照&#xA;- 本人证件照&#xA;- 居住地址或c\/o地址（用于邮寄实体卡）&#xA;- 足量瑞郎现金（具体计算详见“[21 交通票](21交通票.md)”） | 1. 一张临时的办理证明（当场发放）&#xA; 2\\. 一张Swisspass交通实体卡（数周后邮寄，收到实体卡后可在SBB Mobile App上登记为电子卡）                                                                                                       | 落地入境后可立刻办理，便于乘坐交通&#xA;&#xA;（否则每次出行都需要单独买票，费用很高） |\n| [办理Prepaid电话卡（学联福利）](22prepaid电话卡.md) | - 护照&#xA;- 任一新生身份证明文件                                                               | Prepaid实体电话卡或eSIM卡（只有Prepaid实体卡才能享受学联福利，eSIM卡无法享受）                                                                                                                                      | 可根据落地时间提前在预约小程序预约办卡时间，推荐落地当天或第二天在市内开卡点办理        |\n| [大学注册与领新生材料](23大学相关.md)               | - 护照                                                                                | 1. 学生卡（Legi）&#xA;2\\. 学期注册证明（ETH[在线下载](https:\/\/www.lehrbetrieb.ethz.ch\/myStudies\/)，UZH[在线申请](https:\/\/www.students.uzh.ch\/de\/studyadmin\/attestations.html)或去Kanzlei领取）&#xA;3\\. 个人校园账号密码文件 | ETH可提前邮寄，或落地后领取&#xA;UZH落地后领取                    |\n| [找房租房](24找房租房.md)                     | - 护照                                                                                | 1. 租房合同&#xA;2\\. 房间现状检查确认清单                                                                                                                                                              | 越快越好                                            |\n| [住址申报](25住址申报（“户口”）.md)&#xA;同时预约办理居留证 | - 护照&#xA;- 租房合同&#xA;- 学期注册确认书&#xA;- 200瑞郎（刷卡\/现金）                                    | - 申报确认函 （DE:  Meldebestätigung，EN: registration confirmation，这张确认函务必保存好，不要丢失）&#xA; \\- 居留证办理预约单                                                                                          | 拿到学校的”学期注册确认书“以及租房合同后，严格按照约定时间前往，可提前到但不可晚到      |\n| [办理瑞士银行卡](26瑞士银行卡.md)                 | - 护照&#xA;- 申报确认函&#xA;- 学校开具的”学期注册确认书“&#xA;- 手机号                                     | 1. 相关合同文件&#xA;2\\. 储蓄卡&#xA;3\\. Prepaid卡或信用卡                                                                                                                                              | 完成学校注册、租房及住址申报后                                 |\n| [办理保险（学联福利）并申请豁免](27保险及豁免.md)         | - 护照&#xA;- 申报确认函&#xA;- 学校开局的”学期注册确认书“&#xA;- 手机号&#xA;- 瑞士银行卡（便于缴费及报销）                | 1. 卫生局要求报备保险信息的信函（完成住址申报后一段时间通过邮寄方式发送）&#xA;2\\. 保险公司的保险policy相关文件&#xA;3\\. （完成豁免后）卫生局的豁免确认信                                                                                               | 完成学校注册、租房、住址申报及银行卡办理后，入境三个月内必须办理                |\n| [办理居留证](28居留证的办理.md)&#xA;（需要进行指纹录入）   | - 预约单&#xA;- 护照&#xA;- 申报确认函&#xA;- 居住地址（用于邮寄居留证）                                      | 正式居留证（DE: Aufenthaltstitel, EN: residence permit）（办理后数周通过挂号信方式寄送）                                                                                                                       | 严格按照约定时间前往，可提前但不可晚到                             |\n| [Postpaid电话卡（学联福利）](22prepaid电话卡.md)  | - 居留卡&#xA;- 学生卡                                                                     | 1. Postpaid实体电话卡（携号转卡），或&#xA;2\\. 或 Postpaid eSIM卡                                                                                                                                       | 如果办理了Prepaid卡，最早在办理Prepaid的30天后可携号转卡            |\n\n^\n\n#### **具体行动路径**\n\n::::tabs\n:::tab[入境前未找到房（**无租房合同**）]\n1\\. 入境前先找好临时住处（酒店、Airbnb、借宿等），尽量在一周以上（具体根据自身情况而定）;\n\n2\\. 入境落地后尽快办理[Swisspass交通卡](21交通票.md)，拿到临时交通卡证明（落地后在机场或各火车站可以办理）;\nTip：若落地时间较晚SBB柜台已关闭，无法办理交通卡，可在自动售票机上先购买单程票回到住处。第二天到附近的火车站办理Swisspass交通月卡，待找到长租住址并确定日常跨区数后，可转为年卡（按需）\n\n3\\. 办理[Prepaid电话卡](22prepaid电话卡.md)（学联福利，需提前预约，推荐落地当天或第二天市内开卡点办理）；\n\n4\\. [学校报到领新生材料](23学校注册.md)；\n\n5\\. [找房、租房](24找房租房.md)；\n\n6\\. 若在14天内没有找到住处，**必须于入境起14天内前往临时住处所属的人口登记处**【市区为苏黎世南城人口登记办公室（Personenmeldeamt Zürich Süd）】，**向工作人员说明自己的情况**，让工作人员进行临时记录，以免成为“黑户”；\n\n7\\. 找到房子，签署正式租房合同；\n\n8\\. 前往[正式住处所属的人口登记处](25住址申报（“户口”）.md)【市区为苏黎世南城人口登记办公室（Personenmeldeamt Zürich Süd）】进行住址申报（需要租房合同、护照，学期注册确认书），拿到申报确认函（Meldebestätigung），预约移民局录指纹日期；\n\n9\\. 办理[银行卡](26瑞士银行卡.md)（需要护照、学期注册确认书、Meldebestätigung、电话号和居住地址用于核实身份并邮寄材料）；\n\n10\\. 入境三3个月内买[保险并申请豁免](27保险及豁免.md)（[Swisscare学联专属折扣](https:\/\/forum.acssz.org\/d\/51-swisscarebao-xian-guideline-da-yi-he-xue-lian-zhe-kou)，需要学校的Enrolment Confirmation，人口登记办公室的Meldebestätigung，手机号，居住地址，最好有这边银行卡用于缴费和报销）；\n\n11\\. [移民局录指纹](28居留证的办理.md)，以便移民局制作签发正式居留证，等待收到 residence permit \/ Aufenthaltstitel 居留卡；\n\n12\\. 收到居留卡后，办理[Postpaid电话卡](22prepaid电话卡.md)（学联福利）。\n:::\n\n:::tab[入境前已找到房\/长租酒店（**有租房合同**）]\n1\\. 入境落地后尽快办理[Swisspass交通卡](21交通票.md)，拿到临时交通卡证明（落地后在机场或各火车站可以办理）;\n\nTip：若落地时间较晚SBB柜台已关闭，无法办理交通卡，可在自动售票机上先购买单程票回到住处。第二天到附近的火车站办理Swisspass交通月卡\/年卡（按需选择）\n2\\. 办理[Prepaid电话卡](22prepaid电话卡.md)（学联福利，需提前预约，推荐落地当天或第二天市内开卡点办理）；\n\n3\\. 联系房东\/中介签署并拿到租房合同；\n\n4\\. [学校报到领新生材料](23学校注册.md)；\n\n5\\. 前往[正式住处所属的人口登记处](25住址申报（“户口”）.md)【市区为苏黎世南城人口登记办公室（Personenmeldeamt Zürich Süd）】进行住址申报（需要租房合同、护照，学期注册确认书），拿到申报确认函（Meldebestätigung），预约移民局录指纹日期；\n\n6\\. 办理[银行卡](26瑞士银行卡.md)（需要护照、学期注册确认书、Meldebestätigung、电话号和居住地址用于核实身份并邮寄材料）；\n\n7\\. 入境三3个月内买[保险并申请豁免](27保险及豁免.md)（[Swisscare学联专属折扣](https:\/\/forum.acssz.org\/d\/51-swisscarebao-xian-guideline-da-yi-he-xue-lian-zhe-kou)，需要学校的Enrolment Confirmation，人口登记办公室的Meldebestätigung，手机号，居住地址，最好有这边银行卡用于缴费和报销）；\n\n8\\. [移民局录指纹](28居留证的办理.md)，以便移民局制作签发正式居留证，等待收到 residence permit \/ Aufenthaltstitel 居留卡；\n\n9\\. 收到居留卡后，办理[Postpaid电话卡](22prepaid电话卡.md)（学联福利）。\n:::\n::::\n\n^\n^\n^\n","meta":{"mtime":"2023-12-20T04:44:12+08:00"}},"options":{"poweredBy":{"name":"顶想云","link":"https:\/\/www.topthink.com"}}}
